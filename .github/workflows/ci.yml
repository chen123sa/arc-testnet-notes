name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Install forge-std
        run: forge install foundry-rs/forge-std --no-git --shallow
      - name: Validate JS project
        run: npm run check
      - name: Run Foundry tests
        run: forge test
      - name: Build contracts
        run: forge build
